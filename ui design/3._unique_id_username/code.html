<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">search</span>
</button>

<div class="w-full flex flex-col gap-lg">

<h1 class="font-h1 text-on-surface uppercase">YOUR ID</h1>
<p class="font-body-s text-on-surface-variant">This is your unique global identifier. Do not share this with unverified entities.</p>
</div>
<!-- ID Display Block -->
<div class="surface-level-1 p-lg flex flex-col items-center justify-center gap-md">
<div class="font-label-caps text-on-surface-variant uppercase tracking-widest">WIRE IDENTIFICATION NUMBER</div>
<div class="mono-large text-primary-container tracking-widest">8472 9103 65</div>
<button class="flex items-center gap-sm font-label-caps text-on-surface hover:text-primary-container transition-colors p-unit border border-technical bg-[#0A0A0A]">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 0;">content_copy</span>

                </button>
</div>
<!-- Username Configuration -->
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-on-surface-variant uppercase" for="username">PUBLIC ALIAS</label>
<div class="relative flex items-center">
<span class="absolute left-md font-data-mono text-on-surface-variant">@</span>
<input class="input-technical w-full pl-[36px] pr-md py-md font-data-mono text-data-mono" id="username" placeholder="Enter alias" type="text" value="operator_77"/>
<span class="absolute right-md font-label-caps text-sage uppercase flex items-center gap-unit">
<div class="w-2 h-2 rounded-none bg-tertiary-container"></div>
                        AVAILABLE
                    </span>
</div>
<p class="font-body-s text-on-surface-variant mt-unit">This alias will be visible in the global directory.</p>
</div>
<div class="h-px w-full bg-[#2A2A2A] my-sm"></div>
<!-- Connection Status -->
<div class="surface-level-1 p-md flex items-center justify-between">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-on-surface-variant" style="font-variation-settings: 'FILL' 0;">cell_tower</span>
<div class="flex flex-col">
<span class="font-body-m text-on-surface">Network Status</span>
<span class="font-data-mono text-on-surface-variant text-[11px]">PING: 14ms | NODE: ALPHA-9</span>
</div>
</div>
